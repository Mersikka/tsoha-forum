<!DOCTYPE html>
<html>

<head>
  <title>Langan muokkaus</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>
  <h1>Langan muokkaus</h1>
  <form action="/update_thread" method="post">
    <p>
      Otsikko: <br />
      <input required type="text" name="title" value="{{ thread['title'] }}" size="70" maxlength="100" />
    </p>
    <p>
      Leipäteksti: <br />
      <textarea required name="body" rows="15" cols="70" maxlength="5000">{{ thread["body"] }}</textarea>
    </p>
    <p>
      Avainsanat: <br />
      <input type="text" name="tags" value="{{ thread['tags'] }}" size="35" maxlength="100"
        placeholder="#kissat #videopelit #urheilu" pattern="\s*#\S+(?:\s+#\S+)*\s*" />
    </p>
    <input type="hidden" name="thread_id" value="{{ thread['id'] }}" />
    <div>
      <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
      <input class="button" type="submit" value="Päivitä lankaa" />
      <a id="back" class="button" href="/threads/{{ thread['id'] }}">Peruuta</a>
      <button type="button" command="show-modal" commandfor="delete-thread-dialog">
        Poista
      </button>
    </div>
  </form>
  <dialog id="delete-thread-dialog">
    <p>
      Haluatko varmasti poistaa langan?
    </p>
    <button commandfor="delete-thread-dialog" command="close">Peruuta</button>
    <form action="/delete_thread/{{ thread.id }}" method="post">
      <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
      <input type="submit" value="Kyllä, poista lanka" />
    </form>
  </dialog>
</body>

</html>
